baseURL = "https://sandesh.work/"
languageCode = "en"
title = "Sandesh Damkondwar"
theme = "LoveIt"
publishDir = "docs"

enableRobotsTXT = true
enableEmoji = true

[pagination]
  pagerSize = 10

[menu]
  [[menu.main]]
    weight = 1
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
  [[menu.main]]
    weight = 2
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
  [[menu.main]]
    weight = 3
    identifier = "about"
    name = "About"
    url = "/about/"
  [[menu.main]]
    weight = 4
    identifier = "github"
    pre = "<i class='fab fa-github fa-fw' aria-hidden='true'></i>"
    name = ""
    url = "https://github.com/sandeshdamkondwar"
    title = "GitHub"

[params]
  defaultTheme = "auto"
  dateFormat = "January 2, 2006"
  title = "Sandesh Damkondwar"
  description = "Frontend Engineer. Writing about JavaScript, React, performance, and engineering culture."

  [params.author]
    name = "Sandesh Damkondwar"
    email = "sandeshdamkondwar@gmail.com"
    link = "https://sandesh.work"

  [params.header]
    desktopMode = "fixed"
    mobileMode = "auto"
    [params.header.title]
      name = "Sandesh Damkondwar"
      pre = ""
      typeit = false

  [params.footer]
    enable = true
    hugo = false
    copyright = true
    author = true
    since = 2019

  [params.home]
    rss = 10
    [params.home.profile]
      enable = true
      gravatarEmail = "sandeshdamkondwar@gmail.com"
      title = "Sandesh Damkondwar"
      subtitle = "Frontend Engineer · React · Node · Performance"
      typeit = true
      social = true
    [params.home.posts]
      enable = true
      paginate = 10

  [params.social]
    GitHub = "sandeshdamkondwar"
    Linkedin = "sandeshdamkondwar"
    X = "sandydamy"
    Email = "sandeshdamkondwar@gmail.com"
    RSS = true

  [params.search]
    enable = true
    type = "fuse"
    contentLength = 4000
    maxResultLength = 10
    snippetLength = 30
    highlightTag = "em"
    [params.search.fuse]
      minMatchCharLength = 2
      threshold = 0.3

  [params.page]
    lightgallery = true
    linkToMarkdown = false
    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true
    [params.page.code]
      copy = true
      maxShownLines = 50
    [params.page.share]
      enable = true
      X = true
      Linkedin = true
      HackerNews = true
    [params.page.comment]
      enable = false

[markup]
  [markup.highlight]
    codeFences = true
    lineNos = false
    noClasses = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 6

[mediaTypes]
  [mediaTypes."text/plain"]
    suffixes = ["md"]

[outputFormats.MarkDown]
  mediaType = "text/plain"
  isPlainText = true
  isHTML = false

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML", "MarkDown"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]

[permalinks]
  posts = ":filename"
